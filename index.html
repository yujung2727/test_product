<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animal Face Match</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <h1>Which animal do you look like?</h1>
  <p>Upload a picture of a face to see which animal you resemble the most!</p>
  
  <input type="file" id="imageUpload" accept="image/*">
  <button id="predict-button">Analyze</button>
  
  <div id="result">
    <p>Please upload an image.</p>
  </div>
  
  <img id="image-preview" src="" alt="Image preview" style="max-width: 500px; display: none;">
  
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@1.0.0/dist/mobilenet.min.js"></script>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
